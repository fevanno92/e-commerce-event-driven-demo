name: Manual Docker Build

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build-images:
    name: Build Microservices Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- ECR PUSH PREPARATION (Commented out for future use) ---
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: us-east-1

      # - name: Login to Amazon ECR
      #   id: login-ecr
      #   uses: aws-actions/amazon-ecr-login@v2
      
      # NOTE: To push to ECR, change 'push: false' to 'push: true' 
      # and update 'tags' to include your ECR repository URL.
      # Example: tags: ${{ steps.login-ecr.outputs.registry }}/ecommerce-order-service:latest

      - name: Build Product Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./product-service/Dockerfile
          push: false
          tags: ecommerce-product-service:latest # Change to ECR tag when pushing
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Order Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./order-service/Dockerfile
          push: false
          tags: ecommerce-order-service:latest # Change to ECR tag when pushing
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Stock Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./stock-service/Dockerfile
          push: false
          tags: ecommerce-stock-service:latest # Change to ECR tag when pushing
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Payment Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./payment-service/Dockerfile
          push: false
          tags: ecommerce-payment-service:latest # Change to ECR tag when pushing
          cache-from: type=gha
          cache-to: type=gha,mode=max
