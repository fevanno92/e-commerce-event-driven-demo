name: Manual Docker Build

on:
  workflow_dispatch: # Manual trigger

jobs:
  build:
    name: Build & Dockerize
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven' # Native Maven caching for GitHub Actions

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- ECR PUSH PREPARATION (Commented out) ---
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   ... (secrets)
      # - name: Login to Amazon ECR
      #   id: login-ecr
      #   uses: aws-actions/amazon-ecr-login@v2

      # Optimized builds: copying already built JARs using Dockerfile.ci
      
      - name: Build Product Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./product-service/Dockerfile.ci
          push: false
          tags: ecommerce-product-service:latest

      - name: Build Order Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./order-service/Dockerfile.ci
          push: false
          tags: ecommerce-order-service:latest

      - name: Build Stock Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./stock-service/Dockerfile.ci
          push: false
          tags: ecommerce-stock-service:latest

      - name: Build Payment Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./payment-service/Dockerfile.ci
          push: false
          tags: ecommerce-payment-service:latest
