services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    ports:
      - "9411:9411"

  # PostgreSQL for Product Service - always starts
  product-postgres:
    image: postgres:17
    container_name: product-service-postgres
    environment:
      - POSTGRES_DB=productdb
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - product-service-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL for Order Service - always starts
  order-postgres:
    image: postgres:17
    container_name: order-service-postgres
    environment:
      - POSTGRES_DB=orderdb
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - order-service-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Product Service - only with 'app' profile
  product-service:
    build:
      context: ../..
      dockerfile: product-service/Dockerfile
    container_name: ecommerce-product-service
    profiles:
      - app
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://product-postgres:5432/productdb
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    ports:
      - "8081:8081"
    depends_on:
      zipkin:
        condition: service_started
      product-postgres:
        condition: service_healthy

  # Order Service - only with 'app' profile
  order-service:
    build:
      context: ../..
      dockerfile: order-service/Dockerfile
    container_name: ecommerce-order-service
    profiles:
      - app
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://order-postgres:5432/orderdb
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - PRODUCT_SERVICE_URL=http://product-service:8081
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    ports:
      - "8082:8082"
    depends_on:
      zipkin:
        condition: service_started
      order-postgres:
        condition: service_healthy

volumes:
  product-service-postgres-data:
  order-service-postgres-data:
