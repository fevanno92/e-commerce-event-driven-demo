Outputs:
  ALBDNSName:
    Description: 'Public Link to access your APIs'
    Value: !GetAtt SharedALB.DNSName
  ProductEndpoint:
    Value: !Sub 'http://${SharedALB.DNSName}/products'
  OrderEndpoint:
    Value: !Sub 'http://${SharedALB.DNSName}/orders'
