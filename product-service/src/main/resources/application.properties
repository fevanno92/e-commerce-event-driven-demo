spring.application.name=product

server.port=8081

# Distributed tracing
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,tracing,prometheus
management.tracing.export.zipkin.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

logging.pattern.correlation=[${spring.application.name:},%X{traceId:-},%X{spanId:-}] 
spring.cloud.aws.region.static=${AWS_REGION:eu-west-3}
spring.cloud.aws.endpoint=${AWS_ENDPOINT:}
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:test}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:test}
spring.cloud.aws.sns.enabled=false
spring.cloud.aws.sqs.enabled=false